<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" role="img" aria-label="Tvoy Hod tagline">
  <defs>
    <style>
      .tvoy { fill: #EAB308; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-weight: 800; font-size: 48px; letter-spacing: 0.04em; }
      .hod { fill: #6D28D9; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-weight: 800; font-size: 48px; letter-spacing: 0.04em; }
      .tag { fill: #4B5563; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-weight: 600; font-size: 16px; letter-spacing: 0.14em; }
      .stroke { paint-order: stroke fill; stroke: #FFFFFF; stroke-width: 4px; stroke-linejoin: round; }
