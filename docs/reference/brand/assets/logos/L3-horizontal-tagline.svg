  <text class="tag tag-stroke" x="210" y="82" text-anchor="middle">&#1060;&#1048;&#1053;&#1040;&#1053;&#1057;&#1067; &#1050;&#1040;&#1050; &#1048;&#1043;&#1056;&#1040;</text>
