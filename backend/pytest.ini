[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_functions = test_*
markers =
    unit: чистая логика без HTTP (tests/unit)
    integration: TestClient + DB (tests/integration)
    contract: контракт данных FE↔BE или каталог
    acceptance: сквозные сценарии игрока
    slow: длительные симуляции (balance playtest)
