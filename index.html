<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <script>
    /* HashRouter: #/ только на shell игры, не на /landing/ (там якоря #how, #faq). */
    (function () {
      var p = location.pathname;
      if (/\/landing(?:\/|$)/i.test(p)) return;
      var h = location.hash;
      if (!h || h === '#') {
        location.replace(p + location.search + '#/');
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>ТВОЙ ХОД</title>
  <script>
    // Эмуляция Telegram WebApp вне клиента (Safari / PWA).
    // Важно: если WebApp уже есть, но без onEvent — дополняем (иначе падает AppRoot из telegram-ui).
    (function () {
      var listeners = Object.create(null);
      function onEvent(type, fn) {
        if (typeof fn !== 'function') return;
        (listeners[type] || (listeners[type] = [])).push(fn);
      }
      function offEvent(type, fn) {
        if (!listeners[type]) return;
        if (typeof fn !== 'function') {
          delete listeners[type];
          return;
        }
        listeners[type] = listeners[type].filter(function (f) {
          return f !== fn;
        });
      }

      var wa = window.Telegram && window.Telegram.WebApp;
      if (wa && typeof wa.onEvent === 'function' && typeof wa.offEvent === 'function') return;

      if (!wa) {
        wa = {
          initData: '',
          initDataUnsafe: { user: null },
          version: '6.0',
          platform: 'web',
          colorScheme: 'light',
          themeParams: {
            bg_color: '#ffffff',
            text_color: '#0f1115',
            hint_color: '#6b7280',
            link_color: '#6d28d9',
            button_color: '#6d28d9',
            button_text_color: '#ffffff',
            secondary_bg_color: '#f5f6f8',
          },
          isExpanded: true,
          expand: function () {},
          close: function () {},
          sendData: function () {},
          ready: function () {},
          MainButton: {
            show: function () {},
            hide: function () {},
            setText: function () {},
            onClick: function () {},
          },
          BackButton: { show: function () {}, hide: function () {}, onClick: function () {} },
          HapticFeedback: { impactOccurred: function () {} },
        };
      }

      wa.onEvent = onEvent;
      wa.offEvent = offEvent;
      if (typeof wa.ready !== 'function') wa.ready = function () {};
      if (typeof wa.onThemeChanged !== 'function') {
        wa.onThemeChanged = function (cb) {
          onEvent('themeChanged', cb);
          onEvent('theme_changed', cb);
        };
      }

      window.Telegram = window.Telegram || {};
      window.Telegram.WebApp = wa;
    })();
  </script>
