agents:
  economy-balance-runner:
    agent_file: .cursor/agents/economy-balance-runner.md
    description: >-
      Runs balance_simulate + balance_diff vs baseline; regression verdict on
      40-period metrics. Complements economy-reviewer; not a pytest substitute
    subagent_type: shell
    readonly: false
    must_read:
      - docs/balance/README.md
      - docs/decisions/ADR-009-metrics-dictionary-tb1.md
      - backend/scripts/balance_simulate.py
    trigger_globs:
      - backend/app/game/**
      - backend/app/victory/**
      - backend/app/events/**
      - data/events/mvp11/**
      - backend/app/seeds/**
  economy-reviewer:
    agent_file: .cursor/agents/economy-reviewer.md
    description: >-
      Read-only economy review; traces balance number changes; NEEDS REVISION
      without green backend pytest when game/victory/events data or logic changed
    subagent_type: generalPurpose
    readonly: true
    must_read:
      - backend/app/game/period.py
      - backend/app/victory/engine.py
      - docs/specs/features/SPEC_victory-v2.md
      - docs/decisions/ADR-002-victory-engine-and-template-config.md
    trigger_globs:
      - backend/app/game/**
      - backend/app/victory/**
  mqx-ui-reviewer:
    agent_file: .cursor/agents/mqx-ui-reviewer.md
    description: >-
      Read-only MQX/lab review; large UI needs lab+prod+APPROVED in one PR;
      small tweaks allow canon follow-up; does not run pytest or review economy
    subagent_type: generalPurpose
    readonly: true
    must_read:
      - frontend-react/src/components/mqx/DESIGN_WORKFLOW.md
      - docs/specs/SPEC_FRONTEND_UI.md
      - design-lab/dashboard/APPROVED.md
    trigger_globs:
      - frontend-react/src/components/mqx/**
      - frontend-react/src/components/*Premium.jsx
      - design-lab/**
