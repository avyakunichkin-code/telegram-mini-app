#
# status:
#   active   — MVP-цикл; автоподключение уместно
#   optional — по ситуации; не предлагать без явного запроса (tier: deferred)
#   archived — studio/GDD; disable-model-invocation; только явный /skill-name
#
# tier (фаза «контент и данные», см. docs/agents/SKILLS_PHASE_CONTENT_AND_DATA.md):
#   core     — primary в текущей фазе
#   support  — satellite или primary по ситуации (plan, review, ADR)
