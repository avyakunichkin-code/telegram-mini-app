<!DOCTYPE html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Money Quest — новая игра, режим (утверждено)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="lab-header">
      <div>
        <h1>Новая игра — выбор режима</h1>
        <p><strong>Утверждено ★</strong> — паритет с prod (R2 + I1 + Монетка слева на пузыре).</p>
      </div>
      <div class="lab-theme" role="group" aria-label="Тема">
        <button type="button" class="is-active" data-theme-btn="light">Светлая</button>
        <button type="button" data-theme-btn="dark">Тёмная</button>
      </div>
    </header>

    <main class="lab-main">
      <div class="lab-phone__shell lab-phone__shell--flat">
        <div class="mqx-monetka-flow">
            <div class="mqx-monetka-dialog__perch mqx-monetka-dialog__perch--sit-edge">
              <div class="mqx-monetka-dialog__perch-head">
                <img
                  class="lab-mascot lab-mascot--perch"
                  src="./assets/monetka-sit-edge.png"
                  width="124"
                  alt=""
                  aria-hidden="true"
                />
              </div>
              <section class="mqx-monetka-dialog__speech">
              <h1 class="mqx-monetka-dialog__title">Новая игра!</h1>
              <div class="mqx-monetka-dialog__subtitle">
                <p>
                  Я слышала, что в режиме <strong>Игра</strong> можно выбирать различные жизненные ситуации, а в
                  режиме <strong>План</strong> будет что-то очень интересное
                </p>
              </div>
            </section>
          </div>
          <h2 class="mqx-save-kind__heading">Режим игры</h2>
          <div class="mqx-save-kind">
            <button type="button" class="mqx-save-kind__row mqx-save-kind__row--game">
              <span class="mqx-save-kind__icon-wrap mqx-save-kind__icon-wrap--game mqx-save-kind__icon-wrap--game-glow" aria-hidden>
                <svg class="mqx-save-kind__icon" viewBox="0 0 72 72" fill="none" aria-hidden>
                  <path d="M23 24 Q36 12 49 24 Q58 36 49 50 Q36 60 23 50 Q14 36 23 24" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3.5 3" opacity="0.32"/>
                  <circle cx="22" cy="24" r="11" fill="currentColor" opacity="0.1"/>
                  <path d="M22 19l-5 5h3v4h4v-4h3l-5-5z" fill="currentColor" opacity="0.75"/>
                  <circle cx="50" cy="24" r="11" fill="currentColor" opacity="0.1"/>
                  <rect x="44" y="22" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.75"/>
                  <circle cx="36" cy="52" r="5.5" stroke="currentColor" stroke-width="1.75"/>
                  <circle cx="36" cy="32" r="4" fill="currentColor"/>
                </svg>
              </span>
              <span class="mqx-save-kind__body"><span class="mqx-save-kind__title">Игра</span></span>
              <span class="mqx-save-kind__trail" aria-hidden>›</span>
            </button>
            <div class="mqx-save-kind__row mqx-save-kind__row--plan mqx-save-kind__row--soon">
              <span class="mqx-save-kind__badge">Скоро</span>
              <span class="mqx-save-kind__icon-wrap mqx-save-kind__icon-wrap--plan mqx-save-kind__icon-wrap--plan-emerald" aria-hidden>
                <svg class="mqx-save-kind__icon" viewBox="0 0 72 72" fill="none" aria-hidden>
                  <rect x="16" y="18" width="32" height="42" rx="4" stroke="currentColor" stroke-width="2.25"/>
                  <path d="M26 18v-7h12v7" stroke="currentColor" stroke-width="2"/>
                  <path d="M24 30h24M24 38h20" stroke="currentColor" stroke-width="1.75" opacity="0.55"/>
                  <rect x="48" y="44" width="7" height="12" rx="1.5" fill="currentColor" opacity="0.5"/>
                  <rect x="57" y="38" width="7" height="18" rx="1.5" fill="currentColor" opacity="0.65"/>
                </svg>
              </span>
              <span class="mqx-save-kind__body"><span class="mqx-save-kind__title">План</span></span>
            </div>
          </div>
          <button type="button" class="lab-btn lab-btn--outline">Назад</button>
        </div>
      </div>
    </main>

    <script>
      document.querySelectorAll('[data-theme-btn]').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.documentElement.setAttribute('data-theme', btn.getAttribute('data-theme-btn'));
          document.querySelectorAll('[data-theme-btn]').forEach((b) => b.classList.toggle('is-active', b === btn));
        });
      });
    </script>
  </body>
</html>
