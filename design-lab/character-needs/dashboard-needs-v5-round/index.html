<!DOCTYPE html>
<html lang="ru" data-theme="light">
  <head>
    <base href="./" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ТВОЙ ХОД — Самочувствие v5 ★ (design-lab)</title>
    <link rel="stylesheet" href="./lab-base.css" />
    <style data-embed-style>
      html[data-embed="1"] .lab-header,
      html[data-embed="1"] .lab-round-note,
      html[data-embed="1"] .lab-variant-card__label,
      html[data-embed="1"] .lab-variant-card:not(:first-of-type) {
        display: none !important;
      }
      html[data-embed="1"] .lab-main {
        padding: 0 !important;
      }
      html[data-embed="1"] body {
        padding: 0 !important;
      }
    </style>
    <script>
      (function () {
        try {
          var p = new URLSearchParams(location.search);
          if (p.get('embed') === '1') document.documentElement.setAttribute('data-embed', '1');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <header class="lab-header">
      <div>
        <h1>Дашборд — Z-NEEDS v5 ★</h1>
        <p>Prod parity: после hero, summary, footer «Порадовать себя» + «?» в expand.</p>
      </div>
    </header>

    <main class="lab-main">
      <p class="lab-round-note">
        <strong>UX-01:</strong> Z-NEEDS сразу после hero, до «Финансы периода». См.
        <a href="./APPROVED.md">APPROVED.md</a>.
      </p>

      <article class="lab-variant-card lab-variant-card--final">
        <h2 class="lab-variant-card__label">v5 ★ — collapsed</h2>
        <div class="lab-phone">
          <div class="lab-phone__shell">
            <section class="mqx-needs-block" data-lab-variant="v4" aria-labelledby="needs-title-a">
              <div class="mqx-needs-body">
                <div class="mqx-needs-avatar" aria-hidden="true">
                  <img src="./assets/student-mascot.png" alt="" width="129" height="108" class="mqx-needs-avatar__img" />
                </div>
                <div class="mqx-needs-main">
                  <div class="mqx-needs-block__header" role="button" tabindex="0" aria-expanded="false">
                    <div class="mqx-needs-block__head-text">
                      <h2 id="needs-title-a" class="mqx-needs-block__title mqx-finance-static__title">Самочувствие</h2>
                      <p class="mqx-needs-block__summary" data-status="low">Есть просадка</p>
                    </div>
                    <button type="button" class="mqx-needs-improve-link">как улучшить →</button>
                    <svg class="mqx-needs-block__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <path d="m6 9 6 6 6-6" />
                    </svg>
                  </div>
                  <div class="mqx-needs-panel">
                    <div class="mqx-needs-compact">
                      <div class="mqx-needs-bar-row mqx-needs-bar-row--compact">
                        <span class="mqx-needs-bar-label">Связи</span>
                        <div class="mqx-needs-bar-track" role="progressbar" aria-valuenow="28" aria-valuemin="0" aria-valuemax="100">
                          <span class="mqx-needs-bar-fill" data-zone="distressed" style="width: 28%"></span>
                        </div>
                        <span class="mqx-needs-zone-text" data-zone="distressed">Истощение</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </article>

      <article class="lab-variant-card lab-variant-card--final" style="margin-top: 24px">
        <h2 class="lab-variant-card__label">v5 ★ — expanded</h2>
        <div class="lab-phone">
          <div class="lab-phone__shell">
            <section class="mqx-needs-block is-expanded" data-lab-variant="v4" aria-labelledby="needs-title-b">
              <div class="mqx-needs-body">
                <div class="mqx-needs-avatar" aria-hidden="true">
                  <img src="./assets/student-mascot.png" alt="" width="129" height="108" class="mqx-needs-avatar__img" />
                </div>
                <div class="mqx-needs-main">
                  <div class="mqx-needs-block__header" role="button" tabindex="0" aria-expanded="true">
                    <div class="mqx-needs-block__head-text">
                      <h2 id="needs-title-b" class="mqx-needs-block__title mqx-finance-static__title">Самочувствие</h2>
                    </div>
                    <svg class="mqx-needs-block__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                      <path d="m6 9 6 6 6-6" />
                    </svg>
                  </div>
                  <div class="mqx-needs-panel">
                    <div class="mqx-needs-expanded">
                      <div class="mqx-needs-bar-row">
                        <span class="mqx-needs-bar-label">Комфорт</span>
                        <div class="mqx-needs-bar-track" role="progressbar" aria-valuenow="72" aria-valuemin="0" aria-valuemax="100">
                          <span class="mqx-needs-bar-fill" data-zone="ok" style="width: 72%"></span>
                        </div>
                        <span class="mqx-needs-zone-text" data-zone="ok">Норма</span>
                      </div>
                      <div class="mqx-needs-bar-row">
                        <span class="mqx-needs-bar-label">Связи</span>
                        <div class="mqx-needs-bar-track" role="progressbar" aria-valuenow="28" aria-valuemin="0" aria-valuemax="100">
                          <span class="mqx-needs-bar-fill" data-zone="distressed" style="width: 28%"></span>
                        </div>
                        <span class="mqx-needs-zone-text" data-zone="distressed">Истощение</span>
                      </div>
                      <div class="mqx-needs-footer">
                        <button type="button" class="mqx-needs-treat-btn">Порадовать себя</button>
                        <button type="button" class="mqx-needs-help-btn" aria-label="Как улучшить">?</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
